name: 部署文档

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy-gh-pages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        env:
          NODE_OPTIONS: --max_old_space_size=8192
          VITE_RAG_BACKEND_URL: ${{ vars.VITE_RAG_BACKEND_URL || vars.RAG_BACKEND_URL }}
        run: |
          if [ -z "$VITE_RAG_BACKEND_URL" ]; then
            echo "VITE_RAG_BACKEND_URL or RAG_BACKEND_URL repository variable is not configured."
            exit 1
          fi
          rm -rf src/.vuepress/.temp src/.vuepress/.cache src/.vuepress/dist
          pnpm run docs:build
          touch src/.vuepress/dist/.nojekyll

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: src/.vuepress/dist
