name: Notify RAG Backend

on:
  push:
    branches:
      - main
    paths:
      - "src/**/*.md"
      - ".github/workflows/notify-rag-backend.yml"

  workflow_dispatch:

jobs:
  notify-rag-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Notify backend to rebuild all Markdown RAG data
        env:
          RAG_BACKEND_URL: ${{ vars.RAG_BACKEND_URL }}
          RAG_REINDEX_ENDPOINT: ${{ vars.RAG_REINDEX_ENDPOINT }}
          RAG_BACKEND_TOKEN: ${{ secrets.RAG_BACKEND_TOKEN }}
          GITHUB_REPOSITORY_NAME: ${{ github.repository }}
          GITHUB_REF_NAME_VALUE: ${{ github.ref_name }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
          GITHUB_RUN_ID_VALUE: ${{ github.run_id }}
          GITHUB_SERVER_URL_VALUE: ${{ github.server_url }}
        run: |
          set -euo pipefail

          if [ -z "${RAG_BACKEND_URL}" ]; then
            echo "RAG_BACKEND_URL repository variable is required."
            exit 1
          fi

          if [ -z "${RAG_REINDEX_ENDPOINT}" ]; then
            echo "RAG_REINDEX_ENDPOINT repository variable is required."
            exit 1
          fi

          if [ -z "${RAG_BACKEND_TOKEN}" ]; then
            echo "RAG_BACKEND_TOKEN repository secret is required."
            exit 1
          fi

          base_url="${RAG_BACKEND_URL%/}"
          endpoint="/${RAG_REINDEX_ENDPOINT#/}"
          notify_url="${base_url}${endpoint}"
          workflow_url="${GITHUB_SERVER_URL_VALUE}/${GITHUB_REPOSITORY_NAME}/actions/runs/${GITHUB_RUN_ID_VALUE}"

          curl --fail-with-body --show-error --silent --retry 3 --retry-delay 5 \
            --request POST "${notify_url}" \
            --header "Authorization: Bearer ${RAG_BACKEND_TOKEN}" \
            --header "Content-Type: application/json" \
            --data @- <<JSON
          {
            "event": "rag.reindex.requested",
            "mode": "full",
            "content": {
              "include": ["src/**/*.md"],
              "rebuildAllMarkdown": true
            },
            "repository": "${GITHUB_REPOSITORY_NAME}",
            "branch": "${GITHUB_REF_NAME_VALUE}",
            "sha": "${GITHUB_SHA_VALUE}",
            "workflowRunUrl": "${workflow_url}"
          }
          JSON
